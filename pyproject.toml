[tool.ruff]
target-version = "py311"
line-length = 100
src = ["backend/app", "scripts", "backend/tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# FastAPI idiomatically uses Depends(get_db) in defaults.
ignore = ["B008"]

[tool.pytest.ini_options]
pythonpath = ["backend"]
testpaths = ["backend/tests"]
