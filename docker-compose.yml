# Boswell stack: Postgres, Memgraph, Qdrant, FastAPI backend, Vite UI.
# Ollama and MinIO run on the host only (see .env.example).
# Usage: docker compose up --build
#
# Bind mounts use :z so SELinux (e.g. Fedora) relabels host paths for container access.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://boswell:boswell@db:5432/boswell
      MEMGRAPH_URI: bolt://memgraph:7687
      MEMGRAPH_USER: ""
      MEMGRAPH_PASSWORD: ""
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: boswell_chunks
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: llama3.2
      OLLAMA_TIMEOUT_S: "300"
      EMBEDDING_DIMENSION: "768"
      CHUNK_SIZE: "1200"
      CHUNK_OVERLAP: "150"
      MAX_TRAY_ITEMS: "40"
      MAX_TRAY_EXCERPT_CHARS: "120000"
      SOFT_SCOPE_NEIGHBOR_PERIODS: "1"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      KOKORO_TTS_URL: http://kokoro-tts:8001
      KOKORO_TTS_TIMEOUT_S: "300"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      memgraph:
        condition: service_started
      qdrant:
        condition: service_started
      kokoro-tts:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./scripts:/app/scripts:ro,z
      - ./docs:/app/docs:ro,z

  # Kokoro-82M TTS (hexgrad/kokoro). First run may download model weights.
  kokoro-tts:
    build:
      context: .
      dockerfile: kokoro-tts/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - kokoro_hf_cache:/root/.cache/huggingface

  ui:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./ui:/app:z
      - ui_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - memgraph-lab
    environment:
      VITE_API_BASE: ""
      # Vite dev server proxies /memgraph-lab → Lab (same browser origin as UI; iframe works).
      MEMGRAPH_LAB_PROXY_TARGET: http://memgraph-lab:3000

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boswell
      POSTGRES_PASSWORD: boswell
      POSTGRES_DB: boswell
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Host 5432 is often taken by a local Postgres; map to 5435 on the host only.
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boswell -d boswell"]
      interval: 5s
      timeout: 5s
      retries: 5

  memgraph:
    image: memgraph/memgraph:latest
    restart: unless-stopped
    ports:
      - "7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph

  # Memgraph Lab — visual explorer (https://memgraph.com/docs/memgraph-lab)
  memgraph-lab:
    image: memgraph/lab:latest
    restart: unless-stopped
    depends_on:
      - memgraph
    ports:
      # Change host port if 3000 is already in use on your machine.
      - "3000:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: "7687"
      # Served at http://memgraph-lab:3000/memgraph-lab/ inside the stack (see Memgraph Lab BASE_PATH docs).
      BASE_PATH: memgraph-lab

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

volumes:
  pgdata:
  qdrant_data:
  memgraph_data:
  ui_node_modules:
  kokoro_hf_cache:
